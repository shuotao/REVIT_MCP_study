name: 檢查編譯產物未入庫

# 背景：2026-07-17 發現 27 個 obj/bin 編譯產物被追蹤（.gitignore 規則加入前就已 commit，
# 規則不會回溯解除追蹤），導致每次 build 後 git status 出現假性 dirty（nuget.g.props 機器路徑改寫）。
# 此 workflow 為第二道防線：.gitignore 擋 add，這裡擋漏網之魚。

on:
  push:
  pull_request:

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 掃描被追蹤的 obj/bin 編譯產物
        run: |
          TRACKED=$(git ls-files | grep -E '(^|/)(obj|bin)/' || true)
          if [ -n "$TRACKED" ]; then
            echo "❌ 以下編譯產物被 git 追蹤，請執行 git rm -r --cached 移除："
            echo "$TRACKED"
            echo ""
            echo "修復方式：git rm -r --cached <路徑> 後重新 commit（檔案會保留在磁碟上）。"
            exit 1
          fi
          echo "✅ 沒有編譯產物入庫。"
