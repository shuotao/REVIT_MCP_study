<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">Tool call versus language model prior</title>
  <desc id="desc">Concrete data comes from a tool call, not from prior knowledge.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" width="800" height="400"/>

  <!-- LEFT: TOOL CALL — trusted (blue/ok tint) -->
  <g class="pop" style="animation-delay:.4s">
    <rect x="120" y="95" width="220" height="150" rx="14" fill="rgba(96,165,250,.10)" stroke="#60a5fa" stroke-width="2.5"/>
  </g>
  <!-- check above the trusted box -->
  <path class="draw" d="M195 58l28 28 54-58" fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" style="animation-delay:.9s"/>

  <!-- RIGHT: LM PRIOR — rejected (danger tint, dashed) -->
  <g class="pop" style="animation-delay:.55s">
    <rect x="460" y="95" width="220" height="150" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.5)" stroke-width="2" stroke-dasharray="9 7"/>
  </g>
  <!-- cross above the rejected box -->
  <path class="draw" d="M540 48l70 70M610 48l-70 70" stroke="#ef4444" stroke-width="8" stroke-linecap="round" style="animation-delay:.9s"/>

  <g text-anchor="middle" font-size="19" font-weight="700">
    <text class="up" x="230" y="155" fill="#60a5fa" style="animation-delay:1.1s">TOOL CALL</text>
    <text class="up" x="230" y="192" fill="#fff" font-size="24" letter-spacing="2" style="animation-delay:1.25s">829648</text>
    <text class="up muted" x="570" y="155" style="animation-delay:1.1s">LM PRIOR</text>
    <text class="up muted" x="570" y="192" font-size="24" letter-spacing="3" style="animation-delay:1.25s">???</text>
  </g>

  <text class="up lbl" x="400" y="318" text-anchor="middle" font-size="17" letter-spacing="1.5" style="animation-delay:1.5s">EVERY CONCRETE DATUM NEEDS A CURRENT TOOL TRACE</text>
</svg>
