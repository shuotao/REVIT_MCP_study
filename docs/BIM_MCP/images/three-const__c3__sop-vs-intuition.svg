<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">Domain SOP versus intuition</title>
  <desc id="desc">The method comes from domain markdown files rather than internal intuition.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" width="800" height="400"/>

  <!-- side tint panels -->
  <rect class="fade" x="40" y="40" width="320" height="262" rx="14" fill="rgba(96,165,250,.05)" stroke="rgba(96,165,250,.22)" style="animation-delay:.1s"/>
  <rect class="fade" x="440" y="40" width="320" height="262" rx="14" fill="rgba(239,68,68,.05)" stroke="rgba(239,68,68,.22)" style="animation-delay:.2s"/>

  <!-- centre divider -->
  <path class="draw" d="M400 45v280" stroke="rgba(255,255,255,.14)" stroke-width="2" stroke-dasharray="8 10" style="animation-delay:.3s"/>

  <!-- LEFT: domain/*.md — open book (blue, trusted) -->
  <g class="draw" fill="none" stroke="#60a5fa" stroke-width="2.5" style="animation-delay:.65s">
    <path d="M155 120c42-24 85-18 125 10v118c-40-28-83-34-125-10z"/>
    <path d="M280 130c40-28 83-34 125-10v118c-42-24-85-18-125 10z"/>
    <path d="M280 130v118"/>
  </g>
  <!-- text lines on the pages -->
  <g class="draw" fill="none" stroke="rgba(96,165,250,.5)" stroke-width="2" stroke-linecap="round" style="animation-delay:1.1s">
    <path d="M185 160h78M185 180h70M185 200h78"/>
    <path d="M300 160h78M300 180h70M300 200h78"/>
  </g>
  <!-- corner sparkles around the book -->
  <g class="fade" fill="none" stroke="rgba(96,165,250,.55)" stroke-width="2" stroke-dasharray="4 5" style="animation-delay:1.2s">
    <circle cx="84" cy="78" r="13"/>
    <circle cx="97" cy="305" r="13"/>
    <circle cx="360" cy="62" r="13"/>
    <circle cx="364" cy="314" r="13"/>
    <path d="M97 86l62 46M109 294l54-48M350 74l-54 44M352 303l-56-52"/>
  </g>

  <!-- RIGHT: LM INTUITION — thought cloud (muted) -->
  <g class="draw" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="2.5" style="animation-delay:.65s">
    <path d="M560 145c8-43 92-54 120 0 22 42-10 82-58 82-48 0-70-33-62-82z"/>
    <path d="M578 230c22 34 80 34 104 0"/>
    <path d="M598 160c40 0 58 18 58 45"/>
  </g>
  <g class="draw" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2" style="animation-delay:1s">
    <path d="M560 72c58-34 125 4 125 66"/>
    <path d="M690 126l-5 18-16-10"/>
  </g>
  <!-- big red cross over intuition -->
  <path class="draw" d="M540 78l130 130M670 78L540 208" stroke="#ef4444" stroke-width="5" stroke-linecap="round" style="animation-delay:1.25s"/>

  <g text-anchor="middle" font-size="16">
    <text class="up" x="280" y="335" fill="#60a5fa" font-weight="700" style="animation-delay:1.45s">domain/*.md</text>
    <text class="up muted" x="620" y="335" style="animation-delay:1.55s">LM INTUITION</text>
    <text class="up lbl" x="400" y="375" font-size="16" letter-spacing="1.5" style="animation-delay:1.7s">METHOD COMES FROM THE FILE, NOT THE MIND</text>
  </g>
</svg>
