<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="BIM MCP three layer navigation mark">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <!-- soft layer panels -->
  <g fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.14)" stroke-width="1.5">
    <rect class="pop" style="animation-delay:.05s" x="540" y="296" width="520" height="68" rx="14"/>
    <rect class="pop" style="animation-delay:.18s" x="440" y="416" width="720" height="68" rx="14"/>
    <rect class="pop" style="animation-delay:.31s" x="320" y="536" width="960" height="68" rx="14"/>
  </g>

  <!-- the three layer lines -->
  <g fill="none" stroke-linecap="round">
    <line class="draw" style="animation-delay:.3s" x1="560" y1="330" x2="1040" y2="330" stroke="#a78bfa" stroke-width="8"/>
    <line class="draw" style="animation-delay:.45s" x1="460" y1="450" x2="1140" y2="450" stroke="#fff" stroke-width="8"/>
    <line class="draw" style="animation-delay:.6s" x1="340" y1="570" x2="1260" y2="570" stroke="#60a5fa" stroke-width="8"/>
  </g>

  <!-- end nodes -->
  <g>
    <circle class="pop pulse" style="animation-delay:.95s" cx="1040" cy="330" r="16" fill="#a78bfa"/>
    <circle class="pop pulse" style="animation-delay:1.05s" cx="1140" cy="450" r="16" fill="#fff"/>
    <circle class="pop pulse" style="animation-delay:1.15s" cx="1260" cy="570" r="16" fill="#60a5fa"/>
  </g>

  <!-- layer labels -->
  <g text-anchor="end" font-size="26">
    <text class="up" style="animation-delay:.7s" x="520" y="340" fill="#a78bfa" font-weight="700">Skill</text>
    <text class="up" style="animation-delay:.82s" x="420" y="460" fill="#fff" font-weight="700">CLAUDE.md</text>
    <text class="up" style="animation-delay:.94s" x="300" y="580" fill="#60a5fa" font-weight="700">Domain</text>
  </g>

  <text class="up" style="animation-delay:1.3s" x="800" y="712" fill="#fff" font-family="'JetBrains Mono',Consolas,monospace" font-size="36" text-anchor="middle" letter-spacing="4" font-weight="800">BIM_MCP</text>
</svg>
