<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Binary decision versus spectrum decision">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <!-- center divider -->
  <line class="draw" style="animation-delay:.2s" x1="800" y1="120" x2="800" y2="780" stroke="rgba(255,255,255,.14)" stroke-width="2"/>

  <!-- LEFT: binary 0/1 -->
  <rect class="pop" style="animation-delay:.2s" x="265" y="300" width="230" height="230" rx="16" fill="rgba(255,255,255,.04)" stroke="#fff" stroke-width="4"/>
  <g fill="none" stroke-linecap="round">
    <path class="draw" style="animation-delay:.8s" d="M495 360 H630" stroke="#4ade80" stroke-width="4"/>
    <path class="draw" style="animation-delay:.95s" d="M495 470 H630" stroke="#ef4444" stroke-width="4"/>
  </g>

  <!-- RIGHT: spectrum bar -->
  <g>
    <rect class="pop" style="animation-delay:.45s" x="910" y="406" width="200" height="28" rx="6" fill="#fff"/>
    <rect class="pop" style="animation-delay:.6s" x="1110" y="406" width="250" height="28" rx="6" fill="#60a5fa"/>
  </g>

  <g font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle" font-weight="700">
    <text class="up" style="animation-delay:.5s" x="380" y="420" fill="#fff" font-size="34">MCP</text>
    <text class="up" style="animation-delay:1.05s" x="700" y="372" fill="#4ade80" font-size="24">PASS</text>
    <text class="up" style="animation-delay:1.15s" x="700" y="482" fill="#ef4444" font-size="24">FAIL</text>
    <text class="up" style="animation-delay:.7s" x="380" y="650" fill="#fff" font-size="32" letter-spacing="3">0 / 1</text>
    <text class="up" style="animation-delay:.85s" x="935" y="500" fill="#fff" font-size="26">A</text><text class="up" style="animation-delay:.92s" x="1070" y="500" fill="#fff" font-size="26">B</text><text class="up" style="animation-delay:.99s" x="1205" y="500" fill="#60a5fa" font-size="26">C</text><text class="up" style="animation-delay:1.06s" x="1340" y="500" fill="#60a5fa" font-size="26">D</text>
    <text class="up" style="animation-delay:1.2s" x="1160" y="650" fill="#fff" font-size="32" letter-spacing="3">SPECTRUM / DECISION</text>
  </g>
</svg>
