<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Cost curve from requirement to field">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    .mono{font-family:'JetBrains Mono',Consolas,monospace}
  </style>
  <rect class="bg" width="1600" height="900"/>

  <!-- axes -->
  <g stroke="rgba(255,255,255,.14)" stroke-width="2">
    <line class="draw" x1="180" y1="120" x2="180" y2="740" style="animation-delay:.1s"/>
    <line class="draw" x1="180" y1="740" x2="1460" y2="740" style="animation-delay:.2s"/>
  </g>
  <!-- gridlines -->
  <g stroke="rgba(255,255,255,.06)" stroke-width="1">
    <line class="fade" x1="180" y1="600" x2="1460" y2="600" style="animation-delay:.5s"/>
    <line class="fade" x1="180" y1="450" x2="1460" y2="450" style="animation-delay:.6s"/>
    <line class="fade" x1="180" y1="300" x2="1460" y2="300" style="animation-delay:.7s"/>
  </g>

  <!-- area fill under curve -->
  <path class="fade" style="animation-delay:1.5s"
        d="M250 694 C480 680 700 610 890 480 C1080 350 1225 210 1360 140 L1360 740 L250 740 Z"
        fill="url(#cc-grad)"/>
  <defs>
    <linearGradient id="cc-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity=".32"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <filter id="cc-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rising curve -->
  <path class="draw" style="animation-delay:.6s"
        d="M250 694 C480 680 700 610 890 480 C1080 350 1225 210 1360 140"
        fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round" filter="url(#cc-glow)"/>

  <!-- milestone dots + labels -->
  <g class="mono" font-size="24">
    <g style="animation-delay:1.0s" class="pop"><circle cx="250" cy="694" r="11" fill="#4ade80"/></g>
    <text class="lbl up" x="210" y="752" style="animation-delay:1.05s">REQ / $1</text>

    <g style="animation-delay:1.3s" class="pop"><circle cx="650" cy="610" r="11" fill="#fbbf24"/></g>
    <text class="lbl up" x="595" y="668" style="animation-delay:1.35s">DESIGN / $5</text>

    <g style="animation-delay:1.6s" class="pop"><circle cx="990" cy="405" r="11" fill="#fb923c"/></g>
    <text class="lbl up" x="920" y="380" style="animation-delay:1.65s">BUILD / $25</text>

    <g style="animation-delay:2.0s" class="pop"><circle class="pulse" cx="1360" cy="140" r="20" fill="#ef4444"/></g>
    <text class="ttl up" x="1220" y="105" style="animation-delay:2.05s">FIELD / $100</text>
  </g>

  <!-- axis titles -->
  <text class="mono muted up" x="110" y="160" transform="rotate(-90 110 160)" letter-spacing="3" font-size="24" style="animation-delay:.9s">COST</text>
  <text class="mono muted up" x="1340" y="790" letter-spacing="3" font-size="24" style="animation-delay:.9s">PHASE</text>
</svg>
