<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">BIM AI early mover timeline</title>
  <desc id="desc">A timeline from IDS 1.0 to Revit 2027 highlighting the early mover window.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    .mono{font-family:'JetBrains Mono',Consolas,monospace}
  </style>
  <rect class="bg" width="1600" height="500"/>

  <!-- early mover window box -->
  <rect class="fade" x="1048" y="190" width="300" height="130" rx="10" fill="#60a5fa" fill-opacity=".10" stroke="#60a5fa" stroke-width="1.5" style="animation-delay:1.3s"/>
  <text class="mono fade" x="1198" y="228" fill="#60a5fa" text-anchor="middle" font-size="15" letter-spacing="2" style="animation-delay:1.5s">EARLY MOVER WINDOW</text>
  <text class="mono fade" x="1198" y="284" fill="#fff" text-anchor="middle" font-size="16" style="animation-delay:1.6s">12 MONTHS</text>

  <!-- baseline -->
  <line class="draw" x1="120" y1="255" x2="1480" y2="255" stroke="rgba(255,255,255,.3)" stroke-width="2" style="animation-delay:.2s"/>

  <!-- milestone dots -->
  <g stroke-width="2" fill="#0a0a0a">
    <g class="pop" style="animation-delay:.9s"><circle cx="180" cy="255" r="12" fill="#fff" stroke="#fff"/></g>
    <g class="pop" style="animation-delay:1.1s"><circle cx="470" cy="255" r="12" stroke="#fff"/></g>
    <g class="pop" style="animation-delay:1.3s"><circle cx="760" cy="255" r="12" stroke="#fff"/></g>
    <g class="pop" style="animation-delay:1.5s"><circle class="pulse" cx="1080" cy="255" r="13" fill="#60a5fa" stroke="#60a5fa"/></g>
    <g class="pop" style="animation-delay:1.7s"><circle cx="1420" cy="255" r="14" stroke="#fff" stroke-dasharray="4 5"/></g>
  </g>

  <!-- labels -->
  <g class="mono" text-anchor="middle">
    <text class="lbl up" x="180" y="155" font-size="17" style="animation-delay:.95s">IDS 1.0</text>
    <text class="lbl up" x="470" y="155" font-size="17" style="animation-delay:1.15s">PROCORE AI</text>
    <text class="lbl up" x="760" y="155" font-size="17" style="animation-delay:1.35s">DASSAULT VC</text>
    <text class="lbl up" x="1080" y="155" font-size="17" style="animation-delay:1.55s">AUTODESK ASSIST</text>
    <text class="lbl up" x="1420" y="155" font-size="17" style="animation-delay:1.75s">REVIT 2027</text>
    <text class="muted up" x="180" y="333" font-size="15" style="animation-delay:.95s">2024-06</text>
    <text class="muted up" x="470" y="333" font-size="15" style="animation-delay:1.15s">2024-11</text>
    <text class="muted up" x="760" y="333" font-size="15" style="animation-delay:1.35s">2025-Q1</text>
    <text class="up" x="1080" y="333" font-size="15" fill="#60a5fa" style="animation-delay:1.55s">2026-04</text>
    <text class="muted up" x="1420" y="333" font-size="15" style="animation-delay:1.75s">2027</text>
  </g>
</svg>
