<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="Reference archive and latest route map">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" x="0" y="0" width="1600" height="600"/>

  <!-- connectors -->
  <g stroke-linecap="round" fill="none">
    <line class="draw" style="animation-delay:.5s" x1="465" y1="270" x2="650" y2="270" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
    <line class="draw" style="animation-delay:.7s" x1="950" y1="270" x2="1135" y2="270" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
  </g>

  <!-- route nodes -->
  <g fill="rgba(255,255,255,.04)">
    <rect class="pop" style="animation-delay:.1s" x="165" y="180" width="300" height="180" rx="16" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
    <rect class="pop" style="animation-delay:.3s" x="650" y="180" width="300" height="180" rx="16" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
    <rect class="pop" style="animation-delay:.5s" x="1135" y="180" width="300" height="180" rx="16" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
  </g>

  <!-- center hub -->
  <circle class="pop pulse" style="animation-delay:.85s" cx="800" cy="232" r="18" fill="#60a5fa"/>

  <g font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle" font-size="30">
    <text class="up" style="animation-delay:.2s" x="315" y="280" fill="#fff" font-weight="700">REFERENCE</text>
    <text class="up" style="animation-delay:.4s" x="800" y="318" fill="rgba(255,255,255,.82)" font-weight="700">ARCHIVE</text>
    <text class="up" style="animation-delay:.6s" x="1285" y="280" fill="#60a5fa" font-weight="700">LATEST</text>
  </g>
</svg>
