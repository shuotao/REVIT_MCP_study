<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Summary mode for overflow</title>
  <desc id="desc">A terminal output is cut into summary mode.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes flow{to{stroke-dashoffset:-40}}
    .flow{stroke-dasharray:10 8;animation:flow 1.4s linear infinite}
  </style>
  <rect class="bg" width="400" height="400"/>

  <!-- terminal panel -->
  <g class="up" style="animation-delay:.1s">
    <rect x="76" y="52" width="248" height="210" rx="14" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
    <!-- title bar dots -->
    <circle cx="94" cy="68" r="4" fill="#ef4444"/>
    <circle cx="108" cy="68" r="4" fill="#fbbf24"/>
    <circle cx="122" cy="68" r="4" fill="#4ade80"/>
    <line x1="76" y1="80" x2="324" y2="80" stroke="rgba(255,255,255,.14)" stroke-width="1.5"/>
  </g>

  <!-- overflowing raw lines (red, fading down = problem being trimmed) -->
  <g stroke="#ef4444" stroke-width="2" stroke-linecap="round">
    <path class="up" style="animation-delay:.25s" d="M110 100h180"/>
    <path class="up" style="animation-delay:.32s" d="M110 118h180" stroke-opacity=".85"/>
    <path class="up" style="animation-delay:.39s" d="M110 136h150" stroke-opacity=".7"/>
    <path class="up" style="animation-delay:.46s" d="M110 154h180" stroke-opacity=".55"/>
    <path class="up" style="animation-delay:.53s" d="M110 172h120" stroke-opacity=".4"/>
    <path class="up" style="animation-delay:.6s"  d="M110 190h170" stroke-opacity=".28"/>
    <path class="up" style="animation-delay:.67s" d="M110 208h90"  stroke-opacity=".18"/>
  </g>

  <!-- summary line (blue, the fixed/kept result) -->
  <g class="pop" style="animation-delay:1s">
    <rect x="104" y="222" width="192" height="26" rx="8" fill="rgba(96,165,250,.12)" stroke="#60a5fa" stroke-width="2"/>
    <line x1="116" y1="235" x2="284" y2="235" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- scissors cutting glyph (blue) -->
  <g fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" class="pop" style="animation-delay:.85s">
    <circle cx="158" cy="206" r="22"/>
    <circle cx="242" cy="206" r="22"/>
    <path d="M178 218l44 44M222 218l-44 44"/>
  </g>

  <text class="ttl up" x="200" y="344" text-anchor="middle" font-size="18" letter-spacing="1.5" style="animation-delay:1.2s">SUMMARY MODE</text>
</svg>
