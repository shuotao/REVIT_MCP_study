<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Six step contributor workflow</title>
  <desc id="desc">A horizontal workflow from domain markdown to PR review.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" width="1200" height="600"/>

  <!-- connecting track -->
  <path class="draw" d="M160 260h880" stroke="rgba(255,255,255,.14)" stroke-width="2" style="animation-delay:.2s"/>

  <g text-anchor="middle">
    <!-- step nodes 1-5 -->
    <circle class="pop" cx="160" cy="260" r="28" fill="rgba(96,165,250,.10)" stroke="#60a5fa" stroke-width="2.5" style="animation-delay:.45s"/>
    <circle class="pop" cx="336" cy="260" r="28" fill="rgba(96,165,250,.10)" stroke="#60a5fa" stroke-width="2.5" style="animation-delay:.6s"/>
    <circle class="pop" cx="512" cy="260" r="28" fill="rgba(96,165,250,.10)" stroke="#60a5fa" stroke-width="2.5" style="animation-delay:.75s"/>
    <circle class="pop" cx="688" cy="260" r="28" fill="rgba(96,165,250,.10)" stroke="#60a5fa" stroke-width="2.5" style="animation-delay:.9s"/>
    <circle class="pop" cx="864" cy="260" r="28" fill="rgba(96,165,250,.10)" stroke="#60a5fa" stroke-width="2.5" style="animation-delay:1.05s"/>
    <!-- final step node 6 highlighted -->
    <circle class="pop pulse" cx="1040" cy="260" r="29" fill="#4ade80" style="animation-delay:1.2s"/>

    <!-- step numbers -->
    <g font-size="20" font-weight="700">
      <text class="up" x="160" y="267" fill="#60a5fa" style="animation-delay:.7s">1</text>
      <text class="up" x="336" y="267" fill="#60a5fa" style="animation-delay:.85s">2</text>
      <text class="up" x="512" y="267" fill="#60a5fa" style="animation-delay:1s">3</text>
      <text class="up" x="688" y="267" fill="#60a5fa" style="animation-delay:1.15s">4</text>
      <text class="up" x="864" y="267" fill="#60a5fa" style="animation-delay:1.3s">5</text>
      <text class="up" x="1040" y="267" fill="#0a0a0a" style="animation-delay:1.45s">6</text>
    </g>

    <!-- step labels -->
    <g font-size="16">
      <text class="up lbl" x="160" y="345" style="animation-delay:.75s">DOMAIN .MD</text>
      <text class="up lbl" x="336" y="345" style="animation-delay:.9s">SKILL .MD</text>
      <text class="up lbl" x="512" y="345" style="animation-delay:1.05s">WRITE TEST</text>
      <text class="up lbl" x="688" y="345" style="animation-delay:1.2s">UPDATE CLAUDE</text>
      <text class="up lbl" x="864" y="345" style="animation-delay:1.35s">SYNC INDEX</text>
      <text class="up ttl" x="1040" y="345" fill="#4ade80" style="animation-delay:1.5s">PR REVIEW</text>
    </g>
  </g>
</svg>
