<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Twenty two propositions as ordered dots">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    .star{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards,pulse 3.6s ease-in-out infinite}
  </style>
  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <!-- constellation lines -->
  <g fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2" stroke-linecap="round">
    <line class="draw" style="animation-delay:.2s" x1="300" y1="210" x2="1300" y2="690"/>
    <line class="draw" style="animation-delay:.4s" x1="300" y1="690" x2="1300" y2="210"/>
    <line class="draw" style="animation-delay:.6s" x1="800" y1="145" x2="800" y2="755"/>
  </g>

  <!-- 21 outer stars -->
  <g fill="#fff">
    <circle class="star" style="animation-delay:.7s" cx="300" cy="210" r="10"/><circle class="star" style="animation-delay:.75s" cx="430" cy="270" r="10"/><circle class="star" style="animation-delay:.8s" cx="560" cy="330" r="10"/><circle class="star" style="animation-delay:.85s" cx="690" cy="390" r="10"/><circle class="star" style="animation-delay:.9s" cx="820" cy="450" r="10"/><circle class="star" style="animation-delay:.95s" cx="950" cy="510" r="10"/><circle class="star" style="animation-delay:1s" cx="1080" cy="570" r="10"/><circle class="star" style="animation-delay:1.05s" cx="1210" cy="630" r="10"/><circle class="star" style="animation-delay:1.1s" cx="1300" cy="690" r="10"/>
    <circle class="star" style="animation-delay:.72s" cx="300" cy="690" r="10"/><circle class="star" style="animation-delay:.77s" cx="430" cy="630" r="10"/><circle class="star" style="animation-delay:.82s" cx="560" cy="570" r="10"/><circle class="star" style="animation-delay:.87s" cx="690" cy="510" r="10"/><circle class="star" style="animation-delay:.97s" cx="950" cy="390" r="10"/><circle class="star" style="animation-delay:1.02s" cx="1080" cy="330" r="10"/><circle class="star" style="animation-delay:1.07s" cx="1210" cy="270" r="10"/><circle class="star" style="animation-delay:1.12s" cx="1300" cy="210" r="10"/>
    <circle class="star" style="animation-delay:.78s" cx="800" cy="145" r="10"/><circle class="star" style="animation-delay:.88s" cx="800" cy="265" r="10"/><circle class="star" style="animation-delay:1.04s" cx="800" cy="635" r="10"/><circle class="star" style="animation-delay:1.14s" cx="800" cy="755" r="10"/>
  </g>

  <!-- central proposition -->
  <circle class="pop pulse" style="animation-delay:1.25s" cx="800" cy="450" r="18" fill="#60a5fa"/>

  <text class="up" style="animation-delay:1.4s" x="800" y="820" fill="#fff" font-family="'JetBrains Mono',Consolas,monospace" font-size="34" text-anchor="middle" letter-spacing="4" font-weight="800">22 PROPOSITIONS / ONE OPERATING MODEL</text>
</svg>
