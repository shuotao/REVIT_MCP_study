<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Domain first then skill authoring">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" width="1600" height="900"/>

  <!-- column backdrops -->
  <rect class="fade" x="320" y="100" width="360" height="540" rx="18" fill="rgba(96,165,250,.05)" stroke="rgba(96,165,250,.2)" style="animation-delay:.1s"/>
  <rect class="fade" x="920" y="100" width="360" height="540" rx="18" fill="rgba(167,139,250,.05)" stroke="rgba(167,139,250,.2)" style="animation-delay:.2s"/>

  <!-- column headers -->
  <g class="pop" style="animation-delay:.45s">
    <rect x="350" y="130" width="300" height="70" rx="12" fill="rgba(96,165,250,.14)" stroke="#60a5fa" stroke-width="2.5"/>
  </g>
  <g class="pop" style="animation-delay:.55s">
    <rect x="950" y="130" width="300" height="70" rx="12" fill="rgba(167,139,250,.14)" stroke="#a78bfa" stroke-width="2.5"/>
  </g>

  <!-- left column rows (DOMAIN) -->
  <g>
    <rect class="pop" x="365" y="270" width="270" height="85" rx="12" fill="rgba(96,165,250,.06)" stroke="#60a5fa" stroke-width="2" style="animation-delay:.7s"/>
    <rect class="pop" x="365" y="395" width="270" height="85" rx="12" fill="rgba(96,165,250,.06)" stroke="#60a5fa" stroke-width="2" style="animation-delay:.85s"/>
    <rect class="pop" x="365" y="520" width="270" height="85" rx="12" fill="rgba(96,165,250,.06)" stroke="#60a5fa" stroke-width="2" style="animation-delay:1s"/>
  </g>

  <!-- right column rows (SKILL) -->
  <g>
    <rect class="pop" x="965" y="270" width="270" height="85" rx="12" fill="rgba(167,139,250,.06)" stroke="#a78bfa" stroke-width="2" style="animation-delay:.95s"/>
    <rect class="pop" x="965" y="395" width="270" height="85" rx="12" fill="rgba(167,139,250,.06)" stroke="#a78bfa" stroke-width="2" style="animation-delay:1.1s"/>
    <rect class="pop" x="965" y="520" width="270" height="85" rx="12" fill="rgba(167,139,250,.06)" stroke="#a78bfa" stroke-width="2" style="animation-delay:1.25s"/>
  </g>

  <!-- connectors domain -> skill -->
  <g fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2.5" stroke-linecap="round">
    <path class="draw" d="M635 312 H955" marker-end="url(#arr)" style="animation-delay:1.35s"/>
    <path class="draw" d="M635 438 H955" marker-end="url(#arr)" style="animation-delay:1.45s"/>
    <path class="draw" d="M635 563 H955" marker-end="url(#arr)" style="animation-delay:1.55s"/>
  </g>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="rgba(255,255,255,.45)"/>
    </marker>
  </defs>

  <!-- feedback loop -->
  <path class="draw" d="M500 605 C650 735 950 735 1100 605" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="2400" style="animation-delay:1.65s"/>

  <!-- text -->
  <g text-anchor="middle">
    <text class="up ttl" x="500" y="176" font-size="28" fill="#60a5fa" style="animation-delay:.9s">DOMAIN / *.md</text>
    <text class="up ttl" x="1100" y="176" font-size="28" fill="#a78bfa" style="animation-delay:1s">SKILL / YAML</text>

    <text class="up lbl" x="500" y="323" font-size="28" style="animation-delay:1.1s">1 SOP</text>
    <text class="up lbl" x="500" y="448" font-size="28" style="animation-delay:1.2s">2 METHOD</text>
    <text class="up lbl" x="500" y="573" font-size="28" style="animation-delay:1.3s">3 TEST</text>

    <text class="up lbl" x="1100" y="323" font-size="28" style="animation-delay:1.35s">1 REF</text>
    <text class="up lbl" x="1100" y="448" font-size="28" style="animation-delay:1.45s">2 TOOLS</text>
    <text class="up lbl" x="1100" y="573" font-size="28" style="animation-delay:1.55s">3 FLOW</text>

    <text class="up ttl pulse" x="800" y="780" font-size="32" letter-spacing="3" style="animation-delay:1.8s">WRITE KNOWLEDGE FIRST / ORCHESTRATE SECOND</text>
  </g>
</svg>
