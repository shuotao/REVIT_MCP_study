<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="Tool Domain Skill concentric frame">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" x="0" y="0" width="1600" height="600"/>

  <g transform="translate(800 290)">
    <!-- outer skill ring -->
    <circle class="pop" style="animation-delay:.5s" r="260" fill="rgba(96,165,250,.05)" stroke="#60a5fa" stroke-width="3"/>
    <!-- domain ring -->
    <circle class="pop" style="animation-delay:.3s" r="170" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
    <!-- tool core -->
    <circle class="pop" style="animation-delay:.1s" r="80" fill="#fff"/>
    <!-- pointer -->
    <g class="up" style="animation-delay:1.1s">
      <line x1="0" y1="0" x2="330" y2="-150" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
      <path d="M330 -150 l-42 -6 l22 36z" fill="#60a5fa"/>
    </g>
  </g>

  <g font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle" font-weight="700">
    <text class="up" style="animation-delay:.7s" x="800" y="300" fill="#0a0a0a" font-size="28">TOOL</text>
    <text class="up" style="animation-delay:.85s" x="800" y="116" fill="rgba(255,255,255,.82)" font-size="24">DOMAIN</text>
    <text class="up" style="animation-delay:1s" x="800" y="40" fill="#60a5fa" font-size="24">SKILL</text>
    <text class="up" style="animation-delay:1.25s" x="800" y="540" fill="#fff" font-size="28" letter-spacing="3">ORCHESTRATION / KNOWLEDGE / EXECUTION</text>
  </g>
</svg>
