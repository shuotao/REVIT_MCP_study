<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="One command fans out to five Revit versions">
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    .mono{font-family:'JetBrains Mono',Consolas,monospace}
  </style>
  <rect class="bg" width="1600" height="900"/>

  <!-- command box -->
  <rect class="up" x="435" y="190" width="730" height="120" rx="14" fill="rgba(255,255,255,.04)" stroke="#60a5fa" stroke-width="2.5" style="animation-delay:.1s"/>
  <circle class="up" cx="475" cy="226" r="7" fill="#ef4444" style="animation-delay:.25s"/>
  <circle class="up" cx="500" cy="226" r="7" fill="#fbbf24" style="animation-delay:.3s"/>
  <circle class="up" cx="525" cy="226" r="7" fill="#4ade80" style="animation-delay:.35s"/>
  <text class="mono ttl up" x="800" y="282" font-size="34" text-anchor="middle" style="animation-delay:.4s">$ dotnet build -c Release.R{YY}</text>

  <!-- fan-out connectors -->
  <g stroke="#60a5fa" stroke-width="2.5" fill="none" opacity=".7">
    <line class="draw" x1="800" y1="310" x2="330" y2="560" style="animation-delay:.9s"/>
    <line class="draw" x1="800" y1="310" x2="565" y2="560" style="animation-delay:1.0s"/>
    <line class="draw" x1="800" y1="310" x2="800" y2="560" style="animation-delay:1.1s"/>
    <line class="draw" x1="800" y1="310" x2="1035" y2="560" style="animation-delay:1.2s"/>
    <line class="draw" x1="800" y1="310" x2="1270" y2="560" style="animation-delay:1.3s"/>
  </g>

  <!-- version boxes -->
  <g class="mono" font-size="30" text-anchor="middle">
    <g class="pop" style="animation-delay:1.5s">
      <rect x="265" y="560" width="130" height="70" rx="10" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
      <text x="330" y="606" fill="#fff">R22</text>
    </g>
    <g class="pop" style="animation-delay:1.6s">
      <rect x="500" y="560" width="130" height="70" rx="10" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
      <text x="565" y="606" fill="#fff">R23</text>
    </g>
    <g class="pop" style="animation-delay:1.7s">
      <rect x="735" y="560" width="130" height="70" rx="10" fill="#60a5fa"/>
      <text x="800" y="606" fill="#0a0a0a" font-weight="800">R24</text>
    </g>
    <g class="pop" style="animation-delay:1.8s">
      <rect x="970" y="560" width="130" height="70" rx="10" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
      <text x="1035" y="606" fill="#fff">R25</text>
    </g>
    <g class="pop" style="animation-delay:1.9s">
      <rect x="1205" y="560" width="130" height="70" rx="10" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.3)" stroke-width="2"/>
      <text x="1270" y="606" fill="#fff">R26</text>
    </g>
  </g>

  <!-- caption -->
  <text class="mono lbl up" x="800" y="760" font-size="32" text-anchor="middle" letter-spacing="3" style="animation-delay:2.1s">ONE COMMAND / FIVE REVIT VERSIONS</text>
</svg>
