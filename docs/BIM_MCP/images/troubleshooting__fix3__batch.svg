<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Batch mode for stair headroom</title>
  <desc id="desc">A stair icon is paired with xN to indicate batch mode.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" width="400" height="400"/>

  <!-- stacked ghost stairs behind = batch (the xN copies) -->
  <g fill="none" stroke="#60a5fa" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <path class="pop" style="animation-delay:.5s"  d="M70 258h50v-40h50v-40h50v-40h50V98h58" opacity=".15" transform="translate(20 -20)"/>
    <path class="pop" style="animation-delay:.4s"  d="M70 258h50v-40h50v-40h50v-40h50V98h58" opacity=".25" transform="translate(10 -10)"/>
  </g>

  <!-- primary stair (drawn) -->
  <path class="draw" d="M70 258h50v-40h50v-40h50v-40h50V98h58" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- headroom check tick on the stair -->
  <path class="pop" style="animation-delay:1.4s" d="M150 200 l14 14 l26 -34" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- xN multiplier badge -->
  <text class="pop" style="animation-delay:1.1s" x="272" y="215" fill="#60a5fa" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="58" font-weight="800">xN</text>

  <text class="ttl up" style="animation-delay:1.5s" x="200" y="342" text-anchor="middle" font-size="20" letter-spacing="2">BATCH MODE</text>
</svg>
