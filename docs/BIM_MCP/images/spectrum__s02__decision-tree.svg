<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">A/B/C/D decision tree</title>
  <desc id="desc">A fail result fans out to four possible decision paths and costs.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="800"/>

  <!-- FAIL node -->
  <rect class="pop" style="animation-delay:.1s" x="520" y="80" width="160" height="96" rx="14" fill="rgba(239,68,68,.08)" stroke="#ef4444" stroke-width="2"/>
  <text class="up" style="animation-delay:.3s" x="600" y="138" fill="#ef4444" text-anchor="middle" font-family="'JetBrains Mono',Consolas,monospace" font-size="28" font-weight="700">FAIL</text>

  <!-- branches -->
  <g fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2" stroke-linecap="round">
    <path class="draw" style="animation-delay:.5s" d="M600 176L190 340"/>
    <path class="draw" style="animation-delay:.62s" d="M600 176L460 340"/>
    <path class="draw" style="animation-delay:.74s" d="M600 176L740 340"/>
    <path class="draw" style="animation-delay:.86s" d="M600 176L1010 340"/>
  </g>

  <g font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle" font-size="22" font-weight="700">
    <rect class="pop" style="animation-delay:.6s" x="95" y="340" width="190" height="92" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
    <text class="up" style="animation-delay:.9s" x="190" y="395" fill="#fff">A / MODIFY</text>
    <rect class="pop" style="animation-delay:.72s" x="365" y="340" width="190" height="92" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
    <text class="up" style="animation-delay:1s" x="460" y="395" fill="#fff">B / DOCUMENT</text>
    <rect class="pop" style="animation-delay:.84s" x="645" y="340" width="190" height="92" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
    <text class="up" style="animation-delay:1.1s" x="740" y="395" fill="#fff">C / NEGOTIATE</text>
    <rect class="pop pulse" style="animation-delay:.96s" x="915" y="340" width="190" height="92" rx="12" fill="rgba(96,165,250,.18)" stroke="#60a5fa" stroke-width="2"/>
    <text class="up" style="animation-delay:1.2s" x="1010" y="395" fill="#60a5fa">D / ESCALATE</text>
  </g>

  <g fill="rgba(255,255,255,.45)" font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle" font-size="15">
    <text class="up" style="animation-delay:1.05s" x="190" y="500">CONNECTED COST</text>
    <text class="up" style="animation-delay:1.15s" x="460" y="500">DOCUMENT BURDEN</text>
    <text class="up" style="animation-delay:1.25s" x="740" y="500">CLIENT NEGOTIATION</text>
    <text class="up" style="animation-delay:1.35s" x="1010" y="500">MEETING TIME</text>
  </g>
</svg>
