<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">Three industry evidence statistics</title>
  <desc id="desc">Three panels show 100x, 70 percent, and dollar impact as evidence for early BIM checks.</desc>
  <style>
    .bg{fill:#0a0a0a}
    text{font-family:'Noto Sans TC','Helvetica Neue',Inter,sans-serif}
    .ttl{fill:#fff;font-weight:800}
    .sub{fill:rgba(255,255,255,.5)}
    .lbl{fill:rgba(255,255,255,.82)}
    .muted{fill:rgba(255,255,255,.45)}
    .up{opacity:0;animation:up .7s cubic-bezier(.16,1,.3,1) forwards}
    .fade{opacity:0;animation:fade .8s ease forwards}
    .pop{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .6s cubic-bezier(.16,1,.3,1) forwards}
    .draw{stroke-dasharray:2400;stroke-dashoffset:2400;animation:draw 1.8s ease forwards}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    @keyframes fade{to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{opacity:0;transform:scale(.5)}60%{opacity:1;transform:scale(1.12)}100%{opacity:1;transform:scale(1)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    .mono{font-family:'JetBrains Mono',Consolas,monospace}
    .panel{fill:rgba(255,255,255,.04);stroke:rgba(255,255,255,.14);stroke-width:1.5}
  </style>
  <rect class="bg" width="1600" height="500"/>

  <!-- panels -->
  <g>
    <rect class="panel up" x="85" y="70" width="410" height="330" rx="18" style="animation-delay:.1s"/>
    <rect class="panel up" x="595" y="70" width="410" height="330" rx="18" style="animation-delay:.25s"/>
    <rect class="panel up" x="1105" y="70" width="410" height="330" rx="18" style="animation-delay:.4s"/>
  </g>

  <!-- accent bars -->
  <g>
    <rect class="up" x="120" y="105" width="64" height="6" rx="3" fill="#60a5fa" style="animation-delay:.5s"/>
    <rect class="up" x="630" y="105" width="64" height="6" rx="3" fill="#4ade80" style="animation-delay:.6s"/>
    <rect class="up" x="1140" y="105" width="64" height="6" rx="3" fill="#fbbf24" style="animation-delay:.7s"/>
  </g>

  <!-- stat 1: x100 -->
  <text class="ttl pop" x="290" y="262" text-anchor="middle" font-size="132" style="animation-delay:.8s" fill="#60a5fa">x100</text>

  <!-- stat 2: pie ~70% -->
  <circle class="fade" cx="800" cy="220" r="86" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="2" style="animation-delay:.6s"/>
  <g class="pop" style="animation-delay:1.0s">
    <path d="M800 220L800 134A86 86 0 1 1 718 246Z" fill="#4ade80"/>
  </g>
  <circle class="fade" cx="800" cy="220" r="86" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="2" style="animation-delay:1.2s"/>

  <!-- stat 3: $ -->
  <text class="ttl pop" x="1310" y="272" text-anchor="middle" font-size="160" style="animation-delay:1.0s" fill="#fbbf24">$</text>

  <!-- captions -->
  <g class="mono" text-anchor="middle" font-size="18" letter-spacing="2">
    <text class="lbl up" x="290" y="360" style="animation-delay:1.2s">BOEHM RULE</text>
    <text class="lbl up" x="800" y="360" style="animation-delay:1.35s">REWORK AVOIDABLE</text>
    <text class="lbl up" x="1310" y="360" style="animation-delay:1.5s">$15-25K / 2-IN DRIFT</text>
  </g>
</svg>
